<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        table{
            margin: auto;
        }
        .galleryImage {
            border: 3px solid black;
            width: 200px;
            height: 150px;
        }
        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 align="center">Community Event Gallery</h1>
    <table>
        <tr>

    <td>
        <img src="music.jpeg"
             alt="Music Event"
             title="Music Event"
             class="galleryImage">

        <p>Music Festival</p>
    </td>

    <td>
        <img src="food.jpg"
             alt="Food Event"
             title="Food Event"
             class="galleryImage">

        <p>Food Carnival</p>
    </td>

    <td>
        <img src="sports.jpeg"
             alt="Sports Event"
             title="Sports Event"
             class="galleryImage">

        <p>Sports Meet</p>
    </td>

</tr>

<tr>

    <td>
        <img src="dance.jpg"
             alt="Dance Event"
             title="Dance Event"
             class="galleryImage">

        <p>Dance Show</p>
    </td>

    <td>
        <img src="art.webp"
             alt="Art Event"
             title="Art Event"
             class="galleryImage">

        <p>Art Exhibition</p>
    </td>

    <td>
        <img src="workshop.png"
             alt="Workshop"
             title="Workshop"
             class="galleryImage">

        <p>Community Workshop</p>
    </td>

</tr>
    </table>
</body>
</html>
