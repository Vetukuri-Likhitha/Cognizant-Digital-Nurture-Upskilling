<!DOCTYPE html>
<html lang="en">
<head>

    <title>User Preferences</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .box{
            width: 400px;
            margin: auto;
            background-color: white;
            padding: 20px;
        }

        select, button{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h2>Save Event Preference</h2>

        <select id="eventType">

            <option value="">Choose Event</option>

            <option>Music Festival</option>
            <option>Food Carnival</option>
            <option>Sports Meet</option>
            <option>Workshop</option>

        </select>

        <button onclick="savePreference()">
            Save Preference
        </button>

        <button onclick="clearPreference()">
            Clear Preferences
        </button>

        <p id="message"></p>

    </div>

    <script>

        window.onload = function(){

            let savedEvent =
            localStorage.getItem("event");

            if(savedEvent){

                document.getElementById("eventType").value =
                savedEvent;

            }

        }

        function savePreference(){

            let event =
            document.getElementById("eventType").value;

            localStorage.setItem("event", event);

            sessionStorage.setItem("event", event);

            document.getElementById("message").innerHTML =
            "Preference Saved";

        }

        function clearPreference(){

            localStorage.clear();

            sessionStorage.clear();
            document.getElementById("eventType").value = "";

            document.getElementById("message").innerHTML =
            "Preferences Cleared";

        }

    </script>

</body>
</html>
